<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0b7cff"><link rel="manifest" href="manifest.json"><title>Mundial 2026</title><style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:#06131f;color:#fff}.top{position:sticky;top:0;z-index:3;background:linear-gradient(180deg,#06131f 75%,#06131f00);padding:18px 14px 16px}h1{margin:0;font-size:26px}.muted{color:#9fb1c5;font-size:13px}.bar{display:flex;gap:8px;margin-top:12px}input,select,button{border:0;border-radius:14px;padding:12px;background:#10283f;color:#fff}input{flex:1;min-width:0}button{background:#0b7cff;font-weight:700}.tabs{display:flex;gap:8px;overflow:auto;padding:0 14px 12px}.tab{white-space:nowrap;background:#10283f;color:#cfe3ff;padding:9px 12px;border-radius:999px;font-size:13px}.tab.on{background:#0b7cff;color:white}#list{padding:0 14px 90px;display:grid;gap:10px}.card{background:linear-gradient(180deg,#0f263b,#0b1d2e);border:1px solid #183a5a;border-radius:20px;padding:14px;box-shadow:0 8px 22px #0004}.row{display:flex;justify-content:space-between;gap:10px;align-items:center}.teams{font-size:18px;font-weight:800;margin:10px 0}.pill{font-size:12px;background:#183a5a;color:#d7eaff;padding:5px 8px;border-radius:999px}.live{background:#db243a}.done{background:#16a06d}.venue{color:#b8c7d8;font-size:13px}.install{position:fixed;left:14px;right:14px;bottom:14px;background:#fff;color:#06131f;border-radius:18px;padding:12px 14px;display:none;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 8px 28px #0008}.install button{color:white}a{color:#9ed0ff}</style></head><body>
<div class="top"><h1>⚽ Mundial 2026</h1><div class="muted">104 partidos · actualización automática cada 60 s cuando hay internet</div><div class="bar"><input id="q" placeholder="Buscar equipo, ciudad o fase"><button id="refresh">Actualizar</button></div></div><div class="tabs" id="tabs"></div><main id="list"></main><div class="install" id="install"><b>Instalar como app</b><button id="installBtn">Instalar</button></div>
<script>
const BASE={schedule};
let matches=JSON.parse(localStorage.getItem('matches2026')||'null')||BASE;
let active='Todos';
const tabs=['Todos','Hoy','México','Grupo A','Grupo B','Grupo C','Grupo D','Round of 32','Round of 16','Final'];
const $=s=>document.querySelector(s);
function fmt(d){return new Date(d+'T12:00:00').toLocaleDateString('es-MX',{weekday:'short',day:'2-digit',month:'short'})}
function renderTabs(){$('#tabs').innerHTML=tabs.map(t=>`<div class="tab ${t===active?'on':''}" onclick="active='${t}';render()">${t}</div>`).join('')}
function filtered(){const q=$('#q').value.toLowerCase();const today=new Date().toISOString().slice(0,10);return matches.filter(m=>{let ok=active==='Todos'||(active==='Hoy'&&m.date===today)||(active==='México'&&(m.home.includes('Mexico')||m.away.includes('Mexico')))||(active.startsWith('Grupo')&&m.stage===active.replace('Grupo ',''))||m.stage===active;let txt=(m.home+' '+m.away+' '+m.city+' '+m.stage+' '+m.venue).toLowerCase();return ok && txt.includes(q)})}
function render(){renderTabs();const arr=filtered();$('#list').innerHTML=arr.map(m=>`<article class="card"><div class="row"><span class="pill">#${m.id} · ${fmt(m.date)} · ${m.stage}</span><span class="pill ${m.status==='En vivo'?'live':m.status==='Finalizado'?'done':''}">${m.status}</span></div><div class="teams">${m.home} <span class="muted">vs</span> ${m.away}</div><div class="row"><div class="venue">${m.venue} · ${m.city}</div><b>${m.score||''}</b></div></article>`).join('')||'<p class="muted">No encontré partidos con ese filtro.</p>'}
async function updateLive(){try{const urls=['https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard','https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world_cup/scoreboard'];let data=null;for(const u of urls){try{let r=await fetch(u);if(r.ok){data=await r.json();break}}catch(e){}}if(!data||!data.events)return;data.events.forEach(ev=>{const comps=ev.competitions?.[0]?.competitors||[];if(comps.length<2)return;const a=comps[0],b=comps[1];const names=[a.team?.displayName,b.team?.displayName].filter(Boolean);const m=matches.find(x=>names.some(n=>x.home.toLowerCase().includes(n.toLowerCase())||n.toLowerCase().includes(x.home.toLowerCase()))&&names.some(n=>x.away.toLowerCase().includes(n.toLowerCase())||n.toLowerCase().includes(x.away.toLowerCase())));if(m){m.status=ev.status?.type?.completed?'Finalizado':(ev.status?.type?.state==='in'?'En vivo':'Programado');m.score=`${a.score??''} - ${b.score??''}`;}});localStorage.setItem('matches2026',JSON.stringify(matches));render();}catch(e){console.log(e)}}
$('#q').addEventListener('input',render);$('#refresh').onclick=updateLive;render();updateLive();setInterval(updateLive,60000);
if('serviceWorker'in navigator) navigator.serviceWorker.register('./sw.js');let deferred;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferred=e;$('#install').style.display='flex'});$('#installBtn').onclick=async()=>{if(deferred){deferred.prompt();deferred=null;$('#install').style.display='none'}};
</script></body></html>
